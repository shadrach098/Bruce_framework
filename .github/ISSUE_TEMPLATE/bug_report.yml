name: Bug report
description: The framework did something unexpected.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        A minimal reproducer is the single biggest thing that gets a bug fixed quickly.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: One or two sentences. What did you expect vs. what did you get?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproducer
      description: |
        Paste the smallest possible Python snippet that shows the issue.
        No placeholders (`# your key here`); use real (but non-secret) values.
      render: python
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: agentx-dev version
      description: "`pip show agentx-dev` gives you this."
      placeholder: "3.1.1"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.7"
    validations:
      required: true

  - type: input
    id: provider
    attributes:
      label: Model / provider
      description: Which chat model + provider (Claude, GPT, custom)?
      placeholder: "claude-sonnet-4-6 via anthropic 0.36"

  - type: textarea
    id: traceback
    attributes:
      label: Traceback (if any)
      render: text

  - type: checkboxes
    id: checked
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I checked `docs/cookbook/troubleshooting.md`.
          required: true
        - label: My reproducer runs on a fresh interpreter.
          required: true
