name: pages

on:
  push:
    branches: [master, main]
    # Only redeploy when files that affect the site change.
    paths:
      - "index.html"
      - ".nojekyll"
      - "host/**"
      - "brand/**"
      - "viewer/**"
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for host/build_data.py)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate host/data.js
        # In case docs/ was edited but data.js wasn't rebuilt locally.
        # No package install needed -- build_data.py only uses stdlib.
        run: python host/build_data.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Ship the whole repo. index.html at root redirects to host/,
          # brand/ and viewer/ are reachable via relative paths.
          path: "."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
