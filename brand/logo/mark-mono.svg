  fill via CSS color. Suitable for single-color print, embossing, or
  favicon dark-mode swaps.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="agentx_dev">
  <title>agentx_dev</title>
  <path
    d="M 6 8 L 16 16 L 6 24"
    fill="none"
    stroke="currentColor"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <rect x="21" y="8" width="3" height="16" rx="0.5" fill="currentColor" />
</svg>
